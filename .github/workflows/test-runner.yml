name: Self-Healing Test Agent

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}

      - name: Start Next.js server
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          PORT: 3000

      - name: Run Playwright tests
        id: playwright
        run: |
          npx playwright test --reporter=json,html --output=test-results/artifacts 2>&1 | tee test-results/output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Create or update GitHub Issue on failure
        if: steps.playwright.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            var fs = require('fs');
            var summary = 'Test suite failed.';
            var failedTests = [];

            try {
              var raw = fs.readFileSync('test-results/results.json', 'utf8');
              var results = JSON.parse(raw);
              var suites = results.suites || [];
              for (var i = 0; i < suites.length; i++) {
                var specs = suites[i].specs || [];
                for (var j = 0; j < specs.length; j++) {
                  var tests = specs[j].tests || [];
                  for (var k = 0; k < tests.length; k++) {
                    if (tests[k].status !== 'expected' && tests[k].status !== 'skipped') {
                      failedTests.push({
                        title: specs[j].title,
                        status: tests[k].status,
                        error: (tests[k].results && tests[k].results[0] && tests[k].results[0].error && tests[k].results[0].error.message) || 'Unknown error'
                      });
                    }
                  }
                }
              }
              summary = failedTests.length + ' tests failed out of ' + (results.stats && results.stats.total || '?') + ' total.';
            } catch (e) {
              summary = 'Could not read test results.';
            }

            var failList = failedTests.slice(0, 10).map(function(t) {
              return '- **' + t.title + '**: `' + t.status + '` - ' + t.error;
            }).join('\n');

            var body = '## Bug Detected by Self-Healing Test Agent\n\n'
              + '**Timestamp:** ' + new Date().toISOString() + '\n'
              + '**Run:** [#' + context.runNumber + '](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')\n\n'
              + '### Summary\n' + summary + '\n\n'
              + '### Failed Tests\n' + (failList || 'See artifacts for details') + '\n\n'
              + '### How to Fix\n'
              + '1. Download artifacts (playwright-results-' + context.runNumber + ')\n'
              + '2. Open `playwright-report/index.html`\n'
              + '3. Analyze the failing test\n'
              + '4. Fix the code\n'
              + '5. Push to main for automatic re-test\n\n'
              + '---\n*Created automatically by Self-Healing Test Agent*';

            var existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'automated,bug',
              state: 'open',
              per_page: 5
            });

            if (existingIssues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues.data[0].number,
                body: 'Update - Run #' + context.runNumber + '\n\n' + summary + '\n\n' + failList
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[AUTO] Bug detected: ' + ((failedTests[0] && failedTests[0].title) || 'test failed'),
                body: body,
                labels: ['automated', 'bug']
              });
            }

      - name: Close issue if all tests pass
        if: steps.playwright.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            var existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'automated,bug',
              state: 'open'
            });

            for (var i = 0; i < existingIssues.data.length; i++) {
              var issue = existingIssues.data[i];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'All tests passing in run #' + context.runNumber
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }
