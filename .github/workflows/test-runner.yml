name: Self-Healing Test Agent

on:
  schedule:
    - cron: '0 * * * *'   # ogni ora
  workflow_dispatch:        # lancio manuale
  push:
    branches: [main]        # test su ogni push

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}

      - name: Start Next.js server
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          PORT: 3000

      - name: Run Playwright tests
        id: playwright
        run: |
          npx playwright test \
            --reporter=json \
            --output=test-results/artifacts \
            2>&1 | tee test-results/output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.run_number }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

      - name: Create GitHub Issue on failure
        if: failure() || steps.playwright.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let summary = 'Test suite fallita.';
            let failedTests = [];

            try {
              const results = JSON.parse(
                fs.readFileSync('test-results/results.json', 'utf8')
              );
              const suites = results.suites || [];
              for (const suite of suites) {
                for (const spec of (suite.specs || [])) {
                  for (const test of (spec.tests || [])) {
                    if (test.status !== 'expected' && test.status !== 'skipped') {
                      failedTests.push({
                        title: spec.title,
                        status: test.status,
                        error: test.results?.[0]?.error?.message || 'Unknown error',
                      });
                    }
                  }
                }
              }
              summary = `${failedTests.length} test falliti su ${results.stats?.total || '?'} totali.`;
            } catch(e) {
              summary = 'Impossibile leggere risultati test.';
            }

            const failList = failedTests.slice(0, 10).map(t =>
              `- **${t.title}**: \`${t.status}\` — ${t.error}`
            ).join('\n');

            const body = `## 🚨 Bug Rilevato dal Self-Healing Test Agent

**Timestamp:** ${new Date().toISOString()}
**Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

### Sommario
${summary}

### Test Falliti
${failList || 'Vedi artifacts per dettagli'}

### Screenshots
Scarica gli artifacts dal link sopra per vedere i screenshot.

### Come Fixare
1. Scarica gli artifacts (playwright-results-${context.runNumber})
2. Apri \`playwright-report/index.html\`
3. Analizza il test fallito
4. Fixa il codice
5. Pusha su main → re-test automatico

---
*Creato automaticamente da Self-Healing Test Agent*`;

            // Controlla se esiste già issue aperta
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'automated,bug',
              state: 'open',
              per_page: 5,
            });

            if (existingIssues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssues.data[0].number,
                body: `## Update — Run #${context.runNumber}\n\n${summary}\n\n${failList}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[AUTO] Bug rilevato: ${failedTests[0]?.title || 'test fallito'}`,
                body: body,
                labels: ['automated', 'bug'],
              });
            }

      - name: Close issue if all tests pass
        if: success() && steps.playwright.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'automated,bug',
              state: 'open',
            });

            for (const issue of existingIssues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **Bug risolto** — tutti i test passano nel run #${context.runNumber}`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Send email notification on failure
        if: failure()
        run: |
          if [ -n "$RESEND_API_KEY" ]; then
            curl -s -X POST 'https://api.resend.com/emails' \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H 'Content-Type: application/json' \
              -d '{
                "from": "B2B Finder Tests <onboarding@resend.dev>",
                "to": ["nicolostancato@gmail.com"],
                "subject": "🚨 Bug rilevato dashboard B2B Finder",
                "html": "<h2>Bug rilevato nel Self-Healing Test Agent</h2><p>Run #'"${{ github.run_number }}"'</p><p>Apri GitHub Actions per i dettagli.</p>"
              }'
          fi
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
